{{ with .Site.Params.profile }}
{{ $profile := . }}
<div class="card">
  <div class="row">
    {{ with .photo }}
    <div class="photo-container">
      <img class="headshot" style="{{ printf "aspect-ratio: %s;" ($.Site.Params.photoRatio | default "4 / 5") | safeCSS }}" src="{{ if hasPrefix . "http" }}{{ . }}{{ else }}{{ . | relURL }}{{ end }}" alt="">
    </div>
    {{ end }}
    <div class="text-container">
      <div class="content">
        {{ with .name }}<h2 class="name-header">{{ . }}</h2>{{ end }}
        {{ with .roles }}<p>{{ delimit . "<br>" | safeHTML }}</p>{{ end }}
      </div>
      {{ partial "profile-links.html" . }}
    </div>
  </div>
</div>
{{ end }}
