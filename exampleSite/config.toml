baseURL = 'https://demo.devlix.org/'
title = 'Devlix'
theme = 'devlix'
uglyURLs = true
disableKinds = ['taxonomy', 'term']

[outputs]
  home = ['html', 'rss']
  section = ['html', 'rss']

[params]
  description = 'A small, minimal Hugo theme.'
  footerText = '<a href="https://github.com/mhd64real/hugo-theme-devlix">Devlix on GitHub</a>'
  postsPerPage = 18
  readingSpeed = 200
  asciiArtSize = '0.6rem'
  photoRatio = '4 / 5'   # profile photo aspect ratio; "1 / 1" for square

  [params.profile]
    name = 'Devlix Demo'
    photo = '/img/avatar.svg'
    roles = ['A Hugo theme', 'Minimal by design']

    [[params.profile.links]]
      text = 'github/hugo-theme-devlix'
      url = 'https://github.com/mhd64real/hugo-theme-devlix'

  [params.giscus]
    repo = 'mhd64real/hugo-theme-devlix'
    repoId = 'R_kgDOS_RuiA'
    category = 'General'
    categoryId = 'DIC_kwDOS_RuiM4C_hf5'
    mapping = 'pathname'
    discussionUrl = 'https://github.com/mhd64real/hugo-theme-devlix/discussions/1'

[menu]
  [[menu.main]]
    name = 'Home'
    url = '/index.html'
    weight = 10
  [[menu.main]]
    name = 'Blog'
    url = '/blog/'
    weight = 20
  [[menu.main]]
    name = 'Guestbook'
    url = '/guestbook.html'
    weight = 30

[markup]
  [markup.highlight]
    style = 'monokai'
    noClasses = true
  [markup.goldmark.renderer]
    unsafe = true
