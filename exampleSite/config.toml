baseURL = 'https://demo.devlix.org/'
title = 'Devlix'
theme = 'devlix'
uglyURLs = true

[outputs]
  home = ['html', 'rss']
  section = ['html', 'rss']

[params]
  description = 'A simple, hand-built Hugo theme.'
  footerText = '<a href="https://github.com/mhd64real/hugo-theme-devlix">Devlix on GitHub</a>'
  postsPerPage = 18
  readingSpeed = 200
  asciiArtSize = '0.6rem'
  photoRatio = '4 / 5'   # profile photo aspect ratio; "1 / 1" for square

  [params.profile]
    name = 'Devlix Demo'
    photo = '/img/avatar.svg'
    roles = ['A Hugo theme', 'Minimal by design']

    [[params.profile.links]]
      text = 'hello@example.com'
      url = 'mailto:hello@example.com'
    [[params.profile.links]]
      text = 'github/hugo-theme-devlix'
      url = 'https://github.com/mhd64real/hugo-theme-devlix'

[menu]
  [[menu.main]]
    name = 'Home'
    url = '/index.html'
    weight = 10
  [[menu.main]]
    name = 'Blog'
    url = '/blog/'
    weight = 20

[markup]
  [markup.highlight]
    style = 'monokai'
    noClasses = true
  [markup.goldmark.renderer]
    unsafe = true
